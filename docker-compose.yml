services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      - pgsql
      - redis
      - mailpit
    environment:
      DB_HOST: pgsql
      REDIS_HOST: redis
      MAIL_HOST: mailpit

  pgsql:
    image: pgvector/pgvector:pg16
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: agentstore
      POSTGRES_USER: agentstore
      POSTGRES_PASSWORD: secret
    volumes:
      - pgsql_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1026:1025"
      - "8026:8025"
    environment:
      MP_MAX_MESSAGES: 500

volumes:
  pgsql_data:
  redis_data:

